baseURL = "https://profe.lemeit.ar/"
locale = "es-AR"
title = "Luciano Lamaita"
theme = "PaperMod"

mainSections = ["notes"]

[params]
  author = "Luciano Lamaita"
  description = "Ingeniero | Docente | Saladillo, Buenos Aires"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  math = true

  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"

  [params.homeInfoParams]
    Title = "📚 Notas de Física — 4° año"
    Content = """
Bienvenidos. Acá van a encontrar los apuntes, guías y recursos de la materia.
Navegá por **Notas** para acceder al material de cada unidad.
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lemeit"

  [[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/lemeitok"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/lemeit"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/llamaita/"

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/lemeit.bsky.social"

[menu]
  [[menu.main]]
    name = "Proyectos"
    url = "/projects/"
    weight = 1
  [[menu.main]]
    name = "Notas"
    url = "/notes/"
    weight = 2
  [[menu.main]]
    name = "Sobre mí"
    url = "/about/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true