baseURL = "https://profe.lemeit.ar/"
defaultContentLanguage = "es"
languageCode = "es-AR"
title = "Luciano Lamaita"
theme = "PaperMod"

mainSections = []

[params]
  author = "Luciano Lamaita"
  description = "Ingeniero | Docente | Saladillo, Buenos Aires"
  dateFormat = "02/01/2006"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  math = true

  [params.assets]
    favicon = "/favicon.svg"
    favicon16x16 = "/favicon.svg"
    favicon32x32 = "/favicon.svg"

  [params.homeInfoParams]
      Title = "Hola, soy Luciano 👋"
      Content = """
  Ingeniero en la DVBA y docente de Física y Química en Saladillo, Buenos Aires.
  Este sitio reúne los materiales de mis clases y algunos proyectos técnicos.
    """

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lemeit"

  [[params.socialIcons]]
    name = "instagram"
    url = "https://instagram.com/lemeitok"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/lemeit"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/llamaita/"

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/lemeit.bsky.social"

[menu]
  [[menu.main]]
    name = "Proyectos"
    url = "/projects/"
    weight = 1
  [[menu.main]]
    name = "Notas"
    url = "/notes/"
    weight = 2
  [[menu.main]]
    name = "Sobre mí"
    url = "/about/"
    weight = 3

[frontmatter]
  lastmod = [":git", "lastmod", ":fileModTime", "date"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$']]
          inline = [['$', '$']]
