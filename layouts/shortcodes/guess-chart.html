{{ $conector := .Get "conector" }}
{{ $titulo1 := .Get "titulo1" }}
{{ $titulo2 := .Get "titulo2" }}
{{ $partes := split .Inner "+++" }}
{{ $tabla1 := index $partes 0 }}
{{ $tabla2 := index $partes 1 }}

<div class="guess-chart" style="position:relative; margin:1.5em auto; padding:1.25em 1.25em 1.25em 3em; background:var(--code-bg); border-radius:8px; max-width:480px;">
  <div style="font-weight:bold; margin-bottom:.5em; text-align:center; color:var(--secondary);">{{ $titulo1 }}</div>
  {{ $tabla1 | safeHTML }}
  <div style="font-weight:bold; margin:1.75em 0 .5em; text-align:center; color:var(--secondary);">{{ $titulo2 }}</div>
  {{ $tabla2 | safeHTML }}
</div>

<script>
(function() {
  var conector = {{ $conector }};
  var container = document.currentScript.previousElementSibling;
  if (!container) return;
  var cells = container.querySelectorAll("td, th");
  var matches = [];
  cells.forEach(function(c) {
    if (c.textContent.trim() === conector) matches.push(c);
  });
  matches.forEach(function(c) {
    c.style.color = "var(--primary)";
    c.style.fontWeight = "bold";
  });
  if (matches.length >= 2) {
    var svgNS = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(svgNS, "svg");
    svg.style.position = "absolute";
    svg.style.top = "0"; svg.style.left = "0";
    svg.style.width = "100%"; svg.style.height = "100%";
    svg.style.pointerEvents = "none";
    container.style.position = "relative";
    container.appendChild(svg);

    var marker = document.createElementNS(svgNS, "marker");
    marker.setAttribute("id", "guess-arrow-" + Math.random().toString(36).slice(2));
    marker.setAttribute("viewBox", "0 0 10 10");
    marker.setAttribute("refX", "8");
    marker.setAttribute("refY", "5");
    marker.setAttribute("markerWidth", "6");
    marker.setAttribute("markerHeight", "6");
    marker.setAttribute("orient", "auto-start-reverse");
    var arrowPath = document.createElementNS(svgNS, "path");
    arrowPath.setAttribute("d", "M0,0 L10,5 L0,10 z");
    arrowPath.setAttribute("fill", "var(--primary)");
    marker.appendChild(arrowPath);
    var defs = document.createElementNS(svgNS, "defs");
    defs.appendChild(marker);
    svg.appendChild(defs);

    function draw() {
      var rect0 = container.getBoundingClientRect();
      var r1 = matches[0].getBoundingClientRect();
      var r2 = matches[1].getBoundingClientRect();
      var x1 = r1.left - rect0.left, y1 = r1.top + r1.height/2 - rect0.top;
      var x2 = r2.left - rect0.left, y2 = r2.top + r2.height/2 - rect0.top;
      var gutterX = 14;

      while (svg.childNodes.length > 1) svg.removeChild(svg.lastChild);

      var path = document.createElementNS(svgNS, "path");
      var d = "M " + x2 + " " + y2 + " L " + gutterX + " " + y2 + " L " + gutterX + " " + y1 + " L " + x1 + " " + y1;
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "var(--primary)");
      path.setAttribute("stroke-width", "2");
      path.setAttribute("marker-end", "url(#" + marker.id + ")");
      svg.appendChild(path);
    }
    draw();
    window.addEventListener("resize", draw);
  }
})();
</script>
